filetype: nftables

detect:
    filename: "nftables.conf$"
    header: "^#.*?/etc/nftables"
    
rules:
    - statement: "(chain|define|table)"
    - symbol: "(=)"
    - diff-modified: "(flush|type|counter)"
    - constant.string.char: "(;)"
    - constant.string: '([\"]{1})(.*)([\"]{1})'
    - type: "(\\#\\!)"
    - preproc: "((([$])[a-zA-Z0-9\\_\\-\\+]{1,250})|(([A-Z]{1,})[A-Z\\_]{1,250}))"
    - comment: "(^|[[:space:]])#([^{].*)?$"
    - indent-char.whitespace: "[[:space:]]+$"
    - indent-char: "    + +| +  +"
